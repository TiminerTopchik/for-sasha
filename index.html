<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Для моей Саши 🤎</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #fbf7f0, #f3e9dc, #e8f0e6, #fefae0);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #4e443f;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #wait-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fbf7f0;
            z-index: 1001;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease, visibility 1s;
        }

        .heart-loader {
            font-size: 2.5rem;
            color: #b5835a;
            animation: heartbeat 1.2s infinite;
            margin-bottom: 20px;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            20% { transform: scale(1.15); }
            40% { transform: scale(1.05); }
            60% { transform: scale(1.2); }
            80% { transform: scale(1); }
            100% { transform: scale(1); }
        }

        #wait-overlay p {
            font-size: 0.9rem;
            letter-spacing: 2px;
            color: #b5835a;
            text-transform: uppercase;
            font-weight: 600;
        }

        #intro-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fbf7f0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, visibility 0.8s;
            opacity: 0;
            visibility: hidden;
        }

        #intro-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        #intro-overlay h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #b5835a;
            letter-spacing: 1px;
            margin-bottom: 30px;
            text-align: center;
            padding: 0 20px;
        }

        #countdown {
            font-size: 4.5rem;
            font-weight: 700;
            color: #ddc9b4;
            letter-spacing: 1px;
        }

        #main-content {
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.8s ease, transform 0.8s ease;
            width: 100%;
            max-width: 380px;
            height: 100dvh;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        #main-content.visible {
            display: flex;
            opacity: 1;
            transform: translateY(0);
        }

        .interactive-zone {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            position: relative;
        }

        #compliment-btn {
            background: rgba(255, 255, 255, 0.75);
            color: #b5835a;
            border: 1px solid #eddcd2;
            padding: 14px 38px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 8px 25px rgba(181, 131, 90, 0.15);
            transition: all 0.2s;
            outline: none;
            letter-spacing: 1px;
            z-index: 20;
        }

        #compliment-btn:active {
            transform: scale(0.95);
            background: #fff;
            box-shadow: 0 4px 10px rgba(181, 131, 90, 0.3);
        }

        #compliment-display {
            margin-top: 35px;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #5c524d;
            min-height: 80px;
            padding: 0 10px;
            font-weight: 500;
            text-align: center;
            z-index: 20;
        }

        #quiz-open-btn {
            background: transparent;
            color: #cb997e;
            border: none;
            padding: 10px 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s, transform 0.3s;
            outline: none;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 15px;
            z-index: 20;
        }

        #quiz-open-btn:active {
            transform: scale(0.96);
            color: #b5835a;
        }

        #quiz-zone {
            display: none;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.5s ease, transform 0.5s ease;
            width: 100%;
            max-width: 380px;
            height: 100dvh;
            padding: 50px 24px;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            z-index: 30;
        }

        #quiz-zone.visible {
            display: flex;
            opacity: 1;
            transform: translateY(0);
        }

        .quiz-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .quiz-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: #b5835a;
            margin-bottom: 35px;
            letter-spacing: 0.5px;
            text-align: center;
            max-width: 100%;
            line-height: 1.4;
        }

        .slider-wrapper, .input-wrapper {
            width: 100%;
            padding: 0 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .slider-labels {
            width: 100%;
            display: flex;
            justify-content: space-between;
            color: #cb997e;
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }

        .love-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(181, 131, 90, 0.2);
            border-radius: 10px;
            outline: none;
            margin-bottom: 30px;
        }

        .love-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #b5835a;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(181, 131, 90, 0.3);
            transition: transform 0.1s;
        }

        .love-slider::-webkit-slider-thumb:active {
            transform: scale(1.3);
        }

        #slider-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: #b5835a;
            margin-bottom: 45px;
        }

        .quiz-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid #eddcd2;
            padding: 15px 20px;
            border-radius: 20px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            color: #4e443f;
            outline: none;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            transition: all 0.3s;
            margin-bottom: 45px;
            text-align: center;
        }

        .quiz-input:focus {
            background: #fff;
            border-color: #b5835a;
            box-shadow: 0 0 10px rgba(181, 131, 90, 0.15);
        }

        #quiz-next-btn, #quiz-back-btn {
            background: rgba(255, 255, 255, 0.8);
            color: #b5835a;
            border: 1px solid #eddcd2;
            padding: 12px 45px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            outline: none;
            letter-spacing: 1px;
            box-shadow: 0 6px 15px rgba(181, 131, 90, 0.15);
            transition: all 0.2s;
        }

        #quiz-next-btn:active, #quiz-back-btn:active {
            transform: scale(0.96);
            background: #fff;
        }

        #send-status {
            font-size: 0.9rem;
            color: #cb997e;
            margin-top: 10px;
            font-weight: 500;
            font-style: italic;
        }

        .time-footer {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 20px 0;
            border-top: 1px solid rgba(181, 131, 90, 0.15);
        }

        .time-box {
            text-align: center;
        }

        .time-box p {
            font-size: 0.7rem;
            color: #cb997e;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .time-box div {
            font-size: 1rem;
            font-weight: 600;
            color: #5c524d;
            letter-spacing: 0.5px;
        }

        .heart {
            position: absolute;
            color: rgba(181, 131, 90, 0.12);
            font-size: 12px;
            pointer-events: none;
            z-index: 1;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }
        
        #music-toggle {
            position: absolute;
            top: 24px;
            right: 24px;
            font-size: 1.1rem;
            color: #cb997e;
            cursor: pointer;
            z-index: 100;
            transition: color 0.3s;
        }
        #music-toggle.playing {
            color: #b5835a;
        }

        .summary-list {
            text-align: left;
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 25px;
            padding: 10px;
            background: rgba(255,255,255,0.4);
            border-radius: 15px;
        }
        .summary-item {
            font-size: 0.85rem;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        .summary-item strong {
            color: #b5835a;
        }
    </style>
</head>
<body>

    <div id="music-toggle"><i class="fa-solid fa-music"></i></div>

    <audio id="bg-music" loop preload="auto">
        <source src="https://f.goforfiles.xyz/dl/2/E87wB6R7uA-4B6Y8t9g0Xg/1718032773/yt/6/poshlaya_molli_-_bespechnyjj_rycar_tmy_68511790.mp3" type="audio/mpeg">
    </audio>

    <div id="wait-overlay">
        <i class="fa-solid fa-heart heart-loader"></i>
        <p>Подготовка чуда...</p>
    </div>

    <div id="intro-overlay">
        <h1>Привет, Саша 🤎</h1>
        <div id="countdown">10</div>
    </div>

    <div id="main-content">
        <div class="interactive-zone" id="interactZone">
            <button id="compliment-btn">Нажми на меня</button>
            <div id="compliment-display"></div>
            <button id="quiz-open-btn">Пройти опрос 📊</button>
        </div>

        <div class="time-footer">
            <div class="time-box">
                <p> Мы начали встречатся по твоему времени</p>
                <div id="sasha-timer">00д 00ч 00м 00с</div>
            </div>
            <div class="time-box">
                <p>Мы начали встречатся по моему времени</p>
                <div id="my-timer">00д 00ч 00м 00с</div>
            </div>
        </div>
    </div>

    <div id="quiz-zone">
        <div class="quiz-container" id="quizContainer">
            <div class="quiz-title" id="quizTitle">Насколько ты меня любишь?</div>
            
            <div class="slider-wrapper" id="sliderWrapper">
                <div class="slider-labels">
                    <span>0</span>
                    <span>100</span>
                </div>
                <input type="range" min="0" max="100" value="0" class="love-slider" id="loveSlider">
                <div id="slider-value">0%</div>
            </div>

            <div class="input-wrapper" id="inputWrapper" style="display: none; width: 100%;">
                <input type="text" class="quiz-input" id="quizInput" placeholder="Напиши сюда свой ответ..." autocomplete="off">
            </div>

            <button id="quiz-next-btn">Далее</button>
            <button id="quiz-back-btn" style="display: none;">Продолжить</button>
            <div id="send-status"></div>
        </div>

        <div class="time-footer">
            <div class="time-box">
                <p>Твоё время</p>
                <div id="sasha-timer-q">00д 00ч 00м 00с</div>
            </div>
            <div class="time-box">
                <p>Моё время</p>
                <div id="my-timer-q">00д 00ч 00м 00с</div>
            </div>
        </div>
    </div>

    <script>
        const TELEGRAM_TOKEN = "";
        const TELEGRAM_CHAT_ID = "5633676853";

        const btn = document.getElementById('compliment-btn');
        const display = document.getElementById('compliment-display');
        const waitOverlay = document.getElementById('wait-overlay');
        const introOverlay = document.getElementById('intro-overlay');
        const mainContent = document.getElementById('main-content');
        const countdownEl = document.getElementById('countdown');
        const audio = document.getElementById('bg-music');
        const musicToggle = document.getElementById('music-toggle');
        
        const quizOpenBtn = document.getElementById('quiz-open-btn');
        const quizZone = document.getElementById('quiz-zone');
        const quizContainer = document.getElementById('quizContainer');
        const quizTitle = document.getElementById('quizTitle');
        const sliderWrapper = document.getElementById('sliderWrapper');
        const inputWrapper = document.getElementById('inputWrapper');
        const quizInput = document.getElementById('quizInput');
        const loveSlider = document.getElementById('loveSlider');
        const sliderValue = document.getElementById('slider-value');
        const quizNextBtn = document.getElementById('quiz-next-btn');
        const quizBackBtn = document.getElementById('quiz-back-btn');
        const sendStatus = document.getElementById('send-status');

        const compliments = [
            "Ты лучше всех❤️",
            "Люблю тебя, и всегда буду💚",
            "Надеюсь ты мне не изменяла💕",
            "Мы лучше чем Бродяга и Хлебушек💘",
            "Люблю тебя больше всех💋",
            "Не могу жить без тебя ❣️",
            "Для меня ты как бмв: надёжная и красивая💙",
            "Ты знаешь кто самый красивый человек, если нет то посмотри в зеркало🧡",
            "Ты идеальная 😍"
        ];

        const questions = [
            { type: "slider", title: "Насколько ты меня любишь?" },
            { type: "text", title: "Какая твоя любимая еда?" },
            { type: "text", title: "Кто твой любимый блоггер?" },
            { type: "text", title: "Какая твоя любимая сладость?" },
            { type: "text", title: "Какой твой любимый цветок?" },
            { type: "text", title: "Что тебе во мне нравится?" },
            { type: "text", title: "Что тебе во мне не нравится?" }
        ];

        let currentIndex = 0;
        let currentQuestionIndex = 0;
        let userAnswers = [];

        function startMusic() {
            audio.play().then(() => {
                musicToggle.classList.add('playing');
            }).catch(e => console.log("Audio play blocked by browser settings. Waiting for user interaction."));
        }

        // Включаем трек при любом клике по экрану
        document.body.addEventListener('click', () => {
            if (audio.paused) {
                startMusic();
            }
        }, { once: true });

        musicToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            if (audio.paused) {
                audio.play();
                musicToggle.classList.add('playing');
            } else {
                audio.pause();
                musicToggle.classList.remove('playing');
            }
        });

        setTimeout(() => {
            waitOverlay.style.opacity = '0';
            waitOverlay.style.visibility = 'hidden';
            introOverlay.classList.add('active');
            
            let timeLeft = 10;
            const countdownTimer = setInterval(() => {
                timeLeft--;
                countdownEl.innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(countdownTimer);
                    introOverlay.style.opacity = '0';
                    introOverlay.style.visibility = 'hidden';
                    mainContent.classList.add('visible');
                    startMusic();
                }
            }, 1000);

        }, 5000);

        btn.addEventListener('click', () => {
            if (audio.paused) { startMusic(); }
            
            display.style.opacity = 0;
            setTimeout(() => {
                display.innerText = compliments[currentIndex];
                display.style.opacity = 1;
                display.style.transition = "opacity 0.4s ease";
                currentIndex = (currentIndex + 1) % compliments.length;
            }, 200);
        });

        quizOpenBtn.addEventListener('click', () => {
            mainContent.style.opacity = '0';
            setTimeout(() => {
                mainContent.style.display = 'none';
                quizZone.classList.add('visible');
                resetQuizState();
                renderQuestion();
            }, 500);
        });

        loveSlider.addEventListener('input', (e) => {
            sliderValue.innerText = e.target.value + '%';
        });

        quizNextBtn.addEventListener('click', () => {
            saveCurrentAnswer();
            currentQuestionIndex++;
            
            if (currentQuestionIndex < questions.length) {
                renderQuestion();
            } else {
                processQuizCompletion();
            }
        });

        quizBackBtn.addEventListener('click', () => {
            quizZone.classList.remove('visible');
            setTimeout(() => {
                const oldList = quizContainer.querySelector('.summary-list');
                if(oldList) oldList.remove();
                
                mainContent.style.display = 'flex';
                setTimeout(() => {
                    mainContent.style.opacity = '1';
                }, 50);
            }, 500);
        });

        function resetQuizState() {
            currentQuestionIndex = 0;
            userAnswers = [];
            loveSlider.value = 0;
            sliderValue.innerText = '0%';
            quizInput.value = "";
            quizNextBtn.style.display = "block";
            quizBackBtn.style.display = "none";
            sendStatus.innerText = "";
        }

        function saveCurrentAnswer() {
            let currentQ = questions[currentQuestionIndex];
            if (currentQ.type === "slider") {
                userAnswers.push({ question: currentQ.title, answer: loveSlider.value + '%' });
            } else {
                let textVal = quizInput.value.trim() || "Без ответа😞";
                userAnswers.push({ question: currentQ.title, answer: textVal });
                quizInput.value = "";
            }
        }

        function renderQuestion() {
            let q = questions[currentQuestionIndex];
            quizTitle.innerText = q.title;

            if (q.type === "slider") {
                sliderWrapper.style.display = "flex";
                inputWrapper.style.display = "none";
            } else {
                sliderWrapper.style.display = "none";
                inputWrapper.style.display = "flex";
                quizInput.focus();
            }
        }

        function processQuizCompletion() {
            quizTitle.innerText = "Спасибо за ответы, Сашуля 🤎";
            sliderWrapper.style.display = "none";
            inputWrapper.style.display = "none";
            quizNextBtn.style.display = "none";
            sendStatus.innerText = "Отправка теста...";

            let resultHTML = '<div class="summary-list">';
            userAnswers.forEach(item => {
                resultHTML += `<div class="summary-item"><strong>${item.question}</strong><br>Ответ: ${item.answer}</div>`;
            });
            resultHTML += '</div>';
            quizContainer.insertBefore(document.createRange().createContextualFragment(resultHTML), quizBackBtn);

            sendAnswersToTelegram();
        }

        function sendAnswersToTelegram() {
            let message = "📝 *Новые ответы на опрос от Саши!*\n\n";
            userAnswers.forEach(item => {
                message += `❓ *${item.question}*\n💬 Ответ: _${item.answer}_\n\n`;
            });

            const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
            
            fetch(url, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: message,
                    parse_mode: "Markdown"
                })
            })
            .then(response => response.json())
            .then(data => {
                console.log("Отправлено в ТГ:", data);
                sendStatus.innerText = "Тест успешно отправлен! ✨";
                quizBackBtn.style.display = "block";
            })
            .catch(error => {
                console.error("Ошибка отправки:", error);
                sendStatus.innerText = "Ошибка отправки, но ответы сохранены.";
                quizBackBtn.style.display = "block";
            });
        }

        const sashaStart = new Date('2026-06-06T23:32:00').getTime();
        const myStart = new Date('2026-06-06T22:32:00').getTime();

        function updateTimers() {
            const now = new Date().getTime();

            function calculateDiff(startTime) {
                const diff = now - startTime;
                if (diff < 0) return "00д 00ч 00м 00с";

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                const d = days < 10 ? '0' + days : days;
                const h = hours < 10 ? '0' + hours : hours;
                const m = minutes < 10 ? '0' + minutes : minutes;
                const s = seconds < 10 ? '0' + seconds : seconds;

                return `${d}д ${h}ч ${m}м ${s}с`;
            }

            const formattedSasha = calculateDiff(sashaStart);
            const formattedMy = calculateDiff(myStart);

            document.getElementById('sasha-timer').innerText = formattedSasha;
            document.getElementById('my-timer').innerText = formattedMy;
            document.getElementById('sasha-timer-q').innerText = formattedSasha;
            document.getElementById('my-timer-q').innerText = formattedMy;
        }
        
        setInterval(updateTimers, 1000);
        updateTimers();

        function spawnHeart() {
            const heart = document.createElement('i');
            heart.classList.add('fa-solid', 'fa-heart', 'heart');
            
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = '12px';
            heart.style.animationDuration = Math.random() * 4 + 4 + 's'; 
            heart.style.opacity = Math.random() * 0.2 + 0.1; 
            
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 7000);
        }
        setInterval(spawnHeart, 400);
    </script>
</body>
</html>
